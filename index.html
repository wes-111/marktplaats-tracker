<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Marktplaats Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #f5f0e8;
    --card: #fffdf7;
    --accent: #c84b2f;
    --accent2: #e8a020;
    --text: #1a1410;
    --muted: #8a7f72;
    --border: #ddd5c5;
    --green: #2d7a4f;
    --red: #c84b2f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  header {
    background: var(--accent);
    color: white;
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  header p {
    font-size: 0.78rem;
    opacity: 0.85;
    margin-top: 2px;
  }

  .tabs {
    display: flex;
    background: var(--text);
  }

  .tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    font-size: 0.82rem;
    font-weight: 500;
    color: #aaa;
    cursor: pointer;
    border: none;
    background: none;
    letter-spacing: 0.3px;
    transition: color 0.2s;
  }

  .tab.active {
    color: var(--accent2);
    border-bottom: 2px solid var(--accent2);
  }

  .view { display: none; padding: 16px; }
  .view.active { display: block; }

  /* FORM */
  .form-section {
    background: var(--card);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 14px;
    border: 1px solid var(--border);
  }

  .form-section-title {
    font-family: 'Fraunces', serif;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
  }

  label {
    display: block;
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 5px;
    margin-top: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  label:first-of-type { margin-top: 0; }

  input, select, textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 1rem;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    appearance: none;
    -webkit-appearance: none;
    transition: border-color 0.2s;
  }

  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    background: white;
  }

  textarea { resize: none; height: 80px; }

  .price-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .profit-preview {
    background: linear-gradient(135deg, #f0f7f3, #e8f5ed);
    border: 1.5px solid #b8dfc8;
    border-radius: 8px;
    padding: 12px 16px;
    margin-top: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .profit-preview .label {
    font-size: 0.78rem;
    color: var(--green);
    font-weight: 500;
  }

  .profit-preview .amount {
    font-family: 'Fraunces', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--green);
  }

  .profit-preview.loss { 
    background: linear-gradient(135deg, #fdf2f0, #fbe8e5);
    border-color: #f0c0b8;
  }
  .profit-preview.loss .label,
  .profit-preview.loss .amount { color: var(--red); }

  .btn-primary {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    letter-spacing: 0.2px;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 6px;
  }

  .btn-primary:active { transform: scale(0.98); opacity: 0.9; }

  /* STATS */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }

  .stat-card.full { grid-column: 1 / -1; }

  .stat-card .stat-label {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 500;
  }

  .stat-card .stat-value {
    font-family: 'Fraunces', serif;
    font-size: 1.6rem;
    font-weight: 700;
    margin-top: 4px;
    color: var(--text);
  }

  .stat-card .stat-value.positive { color: var(--green); }
  .stat-card .stat-value.negative { color: var(--red); }

  /* LIST */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    overflow-x: auto;
    padding-bottom: 4px;
  }

  .filter-btn {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--card);
    font-size: 0.78rem;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
  }

  .filter-btn.active {
    background: var(--text);
    color: white;
    border-color: var(--text);
  }

  .item-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 10px;
    position: relative;
    overflow: hidden;
  }

  .item-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--border);
  }

  .item-card.verkocht::before { background: var(--green); }
  .item-card.te-koop::before { background: var(--accent2); }
  .item-card.gereserveerd::before { background: #7a5fc8; }

  .item-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }

  .item-name {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 1.05rem;
    flex: 1;
  }

  .status-badge {
    font-size: 0.68rem;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-left: 8px;
    white-space: nowrap;
  }

  .badge-verkocht { background: #d4f0e2; color: var(--green); }
  .badge-te-koop { background: #fef3d8; color: #b07010; }
  .badge-gereserveerd { background: #ede8f8; color: #5a3ca8; }
  .badge-geen { background: #eee; color: #888; }

  .item-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .item-prices {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .price-in, .price-out {
    font-size: 0.82rem;
  }

  .price-in span, .price-out span {
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    font-weight: 700;
  }

  .price-in span { color: var(--red); }
  .price-out span { color: var(--green); }

  .item-winst {
    font-size: 0.78rem;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 6px;
    margin-left: auto;
  }

  .winst-pos { background: #d4f0e2; color: var(--green); }
  .winst-neg { background: #fde8e5; color: var(--red); }

  .item-note {
    font-size: 0.8rem;
    color: var(--muted);
    font-style: italic;
    margin-top: 6px;
    border-top: 1px solid var(--border);
    padding-top: 6px;
  }

  .item-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .btn-action {
    flex: 1;
    padding: 8px;
    border-radius: 7px;
    border: 1.5px solid var(--border);
    background: transparent;
    font-size: 0.8rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    color: var(--text);
    transition: all 0.15s;
  }

  .btn-action:active { opacity: 0.7; }
  .btn-action.del { color: var(--red); border-color: #f0c0b8; }

  .export-bar {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn-export {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-size: 0.85rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btn-export:active { opacity: 0.8; }
  .btn-csv { background: var(--text); color: white; }
  .btn-clear { background: #fde8e5; color: var(--red); }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }

  .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }
  .empty-state p { font-size: 0.9rem; }

  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 0.85rem;
    z-index: 999;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .accordion-row {
    border-bottom: 1px solid var(--border);
  }

  .accordion-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }

  .accordion-header:active { opacity: 0.7; }

  .accordion-arrow {
    font-size: 0.7rem;
    color: var(--muted);
    transition: transform 0.2s;
    margin-left: 6px;
  }

  .accordion-arrow.open { transform: rotate(90deg); }

  .accordion-body {
    display: none;
    padding-bottom: 6px;
  }

  .accordion-body.open { display: block; }

  .cat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0 7px 12px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    -webkit-user-select: none;
  }

  .cat-row:last-child { border-bottom: none; }
  .cat-row:active { opacity: 0.7; }

  .product-list {
    display: none;
    padding-left: 24px;
    padding-bottom: 4px;
  }

  .product-list.open { display: block; }

  .product-item {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 0.8rem;
    color: var(--muted);
    border-bottom: 1px dotted var(--border);
  }

  .product-item:last-child { border-bottom: none; }

  /* edit modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: flex-end;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg);
    width: 100%;
    border-radius: 20px 20px 0 0;
    padding: 20px;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 16px;
  }

  .modal-title {
    font-family: 'Fraunces', serif;
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 16px;
  }
</style>
</head>
<body>

<header>
  <h1>🛍 Marktplaats Tracker</h1>
  <p>Bijhouden wat je verkoopt & verdient</p>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('invoer', this)">➕ Invoer</button>
  <button class="tab" onclick="switchTab('overzicht', this)">📋 Overzicht</button>
  <button class="tab" onclick="switchTab('stats', this)">📊 Statistieken</button>
</div>

<!-- INVOER -->
<div class="view active" id="view-invoer">

  <div class="form-section">
    <div class="form-section-title">📦 Artikel</div>
    <label>Naam artikel</label>
    <input type="text" id="naam" placeholder="bijv. Vintage vaas, jeansjasje…" autocomplete="off">

    <label>Categorie</label>
    <select id="categorie">
      <option value="">— kies categorie —</option>
      <option>Kleding</option>
      <option>Meubels</option>
      <option>Decoratie</option>
      <option>Keuken</option>
      <option>Speelgoed</option>
      <option>Elektronica</option>
      <option>Boeken</option>
      <option>Sieraden / Accessoires</option>
      <option>Kunst</option>
      <option>Overig</option>
    </select>

    <label>Waar gekocht</label>
    <input type="text" id="winkel" placeholder="bijv. Kringloop Utrecht" autocomplete="off">

    <label>Datum aankoop</label>
    <input type="date" id="datum-inkoop">
  </div>

  <div class="form-section">
    <div class="form-section-title">💰 Prijzen</div>
    <div class="price-row">
      <div>
        <label>Inkoopprijs €</label>
        <input type="number" id="prijs-in" placeholder="0,00" step="0.01" min="0" oninput="updateProfit()">
      </div>
      <div>
        <label>Verkoopprijs €</label>
        <input type="number" id="prijs-uit" placeholder="0,00" step="0.01" min="0" oninput="updateProfit()">
      </div>
    </div>
    <div class="profit-preview" id="profit-preview" style="display:none">
      <span class="label" id="profit-label">Winst</span>
      <span class="amount" id="profit-amount">€ 0,00</span>
    </div>
  </div>

  <div class="form-section">
    <div class="form-section-title">📌 Status</div>
    <label>Status</label>
    <select id="status">
      <option value="te-koop">Te koop</option>
      <option value="gereserveerd">Gereserveerd</option>
      <option value="verkocht">Verkocht</option>
    </select>

    <label>Datum verkoop (optioneel)</label>
    <input type="date" id="datum-verkoop">

    <label>Notitie (optioneel)</label>
    <textarea id="notitie" placeholder="Bijzonderheden, conditie, afspraken…"></textarea>
  </div>

  <button class="btn-primary" onclick="saveItem()">Opslaan</button>
</div>

<!-- OVERZICHT -->
<div class="view" id="view-overzicht">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('alle', this)">Alle</button>
    <button class="filter-btn" onclick="setFilter('te-koop', this)">Te koop</button>
    <button class="filter-btn" onclick="setFilter('verkocht', this)">Verkocht</button>
    <button class="filter-btn" onclick="setFilter('gereserveerd', this)">Gereserveerd</button>
  </div>

  <div class="export-bar">
    <button class="btn-export btn-csv" onclick="exportCSV()">⬇ CSV</button>
    <button class="btn-export" style="background:#e8f0fe;color:#1a56db" onclick="exportJSON()">💾 Backup</button>
    <button class="btn-export" style="background:#e8f0fe;color:#1a56db" onclick="importHistorie()">📥 Historie</button>
    <button class="btn-export btn-clear" onclick="clearAll()">🗑 Wis</button>
  </div>
  <div class="export-bar" style="margin-top:-4px">
    <label style="flex:1;margin:0">
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importJSON(this)">
      <span class="btn-export" style="background:#e8f0fe;color:#1a56db;display:block;text-align:center;cursor:pointer" onclick="document.getElementById('import-file').click()">📂 Herstel backup</span>
    </label>
  </div>

  <div id="items-list"></div>
</div>

<!-- STATS -->
<div class="view" id="view-stats">
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Totaal artikelen</div>
      <div class="stat-value" id="stat-totaal">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Verkocht</div>
      <div class="stat-value positive" id="stat-verkocht">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Totaal inkoopkosten</div>
      <div class="stat-value" id="stat-inkoop">€ 0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Totaal verkocht</div>
      <div class="stat-value positive" id="stat-opbrengst">€ 0</div>
    </div>
    <div class="stat-card full">
      <div class="stat-label">Omzet minus inkoopkosten</div>
      <div class="stat-value" id="stat-winst">€ 0</div>
    </div>
    <div class="stat-card full">
      <div class="stat-label">Nog te verkopen (inkoopprijs)</div>
      <div class="stat-value" id="stat-voorraad">€ 0</div>
    </div>
  </div>

  <div class="form-section">
    <div class="form-section-title">📅 Per maand</div>
    <div id="month-breakdown"></div>
  </div>

  <div class="form-section" id="top-categorie-box">
    <div class="form-section-title">🏆 Per categorie</div>
    <div id="cat-breakdown"></div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Artikel bewerken</div>

    <input type="hidden" id="edit-id">

    <label>Naam artikel</label>
    <input type="text" id="edit-naam">

    <label>Categorie</label>
    <select id="edit-categorie">
      <option value="">— kies categorie —</option>
      <option>Kleding</option><option>Meubels</option><option>Decoratie</option>
      <option>Keuken</option><option>Speelgoed</option><option>Elektronica</option>
      <option>Boeken</option><option>Sieraden / Accessoires</option>
      <option>Kunst</option><option>Overig</option>
    </select>

    <label>Winkel</label>
    <input type="text" id="edit-winkel">

    <label>Datum inkoop</label>
    <input type="date" id="edit-datum-inkoop">

    <div class="price-row">
      <div>
        <label>Inkoopprijs €</label>
        <input type="number" id="edit-prijs-in" step="0.01" min="0">
      </div>
      <div>
        <label>Verkoopprijs €</label>
        <input type="number" id="edit-prijs-uit" step="0.01" min="0">
      </div>
    </div>

    <label>Status</label>
    <select id="edit-status">
      <option value="te-koop">Te koop</option>
      <option value="gereserveerd">Gereserveerd</option>
      <option value="verkocht">Verkocht</option>
    </select>

    <label>Datum verkoop</label>
    <input type="date" id="edit-datum-verkoop">

    <label>Notitie</label>
    <textarea id="edit-notitie"></textarea>

    <button class="btn-primary" onclick="saveEdit()" style="margin-top:16px">Opslaan</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let items = JSON.parse(localStorage.getItem('mp_items') || '[]');
let currentFilter = 'alle';

function save() {
  localStorage.setItem('mp_items', JSON.stringify(items));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function switchTab(tab, el) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
  if (el) el.classList.add('active');
  if (tab === 'overzicht') renderList();
  if (tab === 'stats') renderStats();
}

function fmt(n) {
  return '€\u00a0' + Number(n).toFixed(2).replace('.', ',');
}

function updateProfit() {
  const inc = parseFloat(document.getElementById('prijs-in').value) || 0;
  const uit = parseFloat(document.getElementById('prijs-uit').value) || 0;
  const p = document.getElementById('profit-preview');
  if (!inc && !uit) { p.style.display = 'none'; return; }
  p.style.display = 'flex';
  const diff = uit - inc;
  document.getElementById('profit-amount').textContent = fmt(diff);
  document.getElementById('profit-label').textContent = diff >= 0 ? 'Winst' : 'Verlies';
  p.className = 'profit-preview' + (diff < 0 ? ' loss' : '');
}

function saveItem() {
  const naam = document.getElementById('naam').value.trim();
  if (!naam) { showToast('Vul eerst een naam in'); return; }

  const item = {
    id: Date.now().toString(),
    naam,
    categorie: document.getElementById('categorie').value,
    winkel: document.getElementById('winkel').value.trim(),
    datumInkoop: document.getElementById('datum-inkoop').value,
    prijsIn: parseFloat(document.getElementById('prijs-in').value) || 0,
    prijsUit: parseFloat(document.getElementById('prijs-uit').value) || 0,
    status: document.getElementById('status').value,
    datumVerkoop: document.getElementById('datum-verkoop').value,
    notitie: document.getElementById('notitie').value.trim()
  };

  items.unshift(item);
  save();
  showToast('✓ ' + naam + ' opgeslagen');

  // reset form
  ['naam','winkel','notitie'].forEach(id => document.getElementById(id).value = '');
  ['prijs-in','prijs-uit'].forEach(id => document.getElementById(id).value = '');
  ['datum-inkoop','datum-verkoop'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('categorie').value = '';
  document.getElementById('status').value = 'te-koop';
  document.getElementById('profit-preview').style.display = 'none';
  document.getElementById('datum-inkoop').value = new Date().toISOString().slice(0,10);
  // switch to overzicht and render
  const tabEl = document.querySelector('.tab:nth-child(2)');
  switchTab('overzicht', tabEl);
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList() {
  const list = document.getElementById('items-list');
  const filtered = currentFilter === 'alle' ? items : items.filter(i => i.status === currentFilter);

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>Geen artikelen gevonden</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(item => {
    const winst = item.prijsUit - item.prijsIn;
    const winstHtml = item.prijsUit
      ? `<span class="item-winst ${winst >= 0 ? 'winst-pos' : 'winst-neg'}">${winst >= 0 ? '+' : ''}${fmt(winst)}</span>`
      : '';

    const badgeClass = { verkocht: 'badge-verkocht', 'te-koop': 'badge-te-koop', gereserveerd: 'badge-gereserveerd' }[item.status] || 'badge-geen';
    const badgeLabel = { verkocht: 'Verkocht', 'te-koop': 'Te koop', gereserveerd: 'Gereserveerd' }[item.status] || item.status;

    return `
    <div class="item-card ${item.status}">
      <div class="item-header">
        <div class="item-name">${item.naam}</div>
        <span class="status-badge ${badgeClass}">${badgeLabel}</span>
      </div>
      <div class="item-meta">
        ${item.categorie ? `<span>📂 ${item.categorie}</span>` : ''}
        ${item.winkel ? `<span>🏪 ${item.winkel}</span>` : ''}
        ${item.datumInkoop ? `<span>📅 ${item.datumInkoop}</span>` : ''}
        ${item.datumVerkoop ? `<span>✅ ${item.datumVerkoop}</span>` : ''}
      </div>
      <div class="item-prices">
        <div class="price-in">inkoop <span>${fmt(item.prijsIn)}</span></div>
        ${item.prijsUit ? `<div class="price-out">verkoop <span>${fmt(item.prijsUit)}</span></div>` : ''}
        ${winstHtml}
      </div>
      ${item.notitie ? `<div class="item-note">${item.notitie}</div>` : ''}
      <div class="item-actions">
        <button class="btn-action" onclick="editItem('${item.id}')">✏️ Bewerken</button>
        <button class="btn-action del" onclick="deleteItem('${item.id}')">🗑 Verwijder</button>
      </div>
    </div>`;
  }).join('');
}

function deleteItem(id) {
  if (!confirm('Artikel verwijderen?')) return;
  items = items.filter(i => i.id !== id);
  save();
  renderList();
  showToast('Verwijderd');
}

function editItem(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  document.getElementById('edit-id').value = id;
  document.getElementById('edit-naam').value = item.naam;
  document.getElementById('edit-categorie').value = item.categorie || '';
  document.getElementById('edit-winkel').value = item.winkel || '';
  document.getElementById('edit-datum-inkoop').value = item.datumInkoop || '';
  document.getElementById('edit-prijs-in').value = item.prijsIn || '';
  document.getElementById('edit-prijs-uit').value = item.prijsUit || '';
  document.getElementById('edit-status').value = item.status;
  document.getElementById('edit-datum-verkoop').value = item.datumVerkoop || '';
  document.getElementById('edit-notitie').value = item.notitie || '';
  document.getElementById('modal-overlay').classList.add('open');
}

function saveEdit() {
  const id = document.getElementById('edit-id').value;
  const idx = items.findIndex(i => i.id === id);
  if (idx < 0) return;
  items[idx] = {
    ...items[idx],
    naam: document.getElementById('edit-naam').value.trim(),
    categorie: document.getElementById('edit-categorie').value,
    winkel: document.getElementById('edit-winkel').value.trim(),
    datumInkoop: document.getElementById('edit-datum-inkoop').value,
    prijsIn: parseFloat(document.getElementById('edit-prijs-in').value) || 0,
    prijsUit: parseFloat(document.getElementById('edit-prijs-uit').value) || 0,
    status: document.getElementById('edit-status').value,
    datumVerkoop: document.getElementById('edit-datum-verkoop').value,
    notitie: document.getElementById('edit-notitie').value.trim()
  };
  save();
  document.getElementById('modal-overlay').classList.remove('open');
  renderList();
  showToast('✓ Opgeslagen');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('open');
}

function renderStats() {
  const verkocht = items.filter(i => i.status === 'verkocht');
  const totaalIn = items.reduce((s, i) => s + i.prijsIn, 0);
  const opbrengst = verkocht.reduce((s, i) => s + i.prijsUit, 0);
  const inkoopVerkocht = verkocht.reduce((s, i) => s + i.prijsIn, 0);
  const winst = opbrengst - inkoopVerkocht;
  const voorraadWaarde = items.filter(i => i.status !== 'verkocht').reduce((s, i) => s + i.prijsIn, 0);

  document.getElementById('stat-totaal').textContent = items.length;
  document.getElementById('stat-verkocht').textContent = verkocht.length;
  document.getElementById('stat-inkoop').textContent = fmt(totaalIn);
  document.getElementById('stat-opbrengst').textContent = fmt(opbrengst);

  const wEl = document.getElementById('stat-winst');
  wEl.textContent = fmt(winst);
  wEl.className = 'stat-value ' + (winst >= 0 ? 'positive' : 'negative');

  document.getElementById('stat-voorraad').textContent = fmt(voorraadWaarde);

  // per maand (op basis van verkoopdatum)
  const maanden = {};
  const maandNamen = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
  verkocht.forEach(i => {
    const d = i.datumVerkoop || i.datumInkoop;
    if (!d) return;
    const key = d.slice(0, 7); // "2024-03"
    if (!maanden[key]) maanden[key] = { omzet: 0, inkoop: 0, n: 0 };
    maanden[key].omzet += i.prijsUit;
    maanden[key].inkoop += i.prijsIn;
    maanden[key].n++;
  });

  const maandSorted = Object.entries(maanden).sort((a, b) => b[0].localeCompare(a[0]));

  // build month data with items per category per product
  const maandItems = {};
  verkocht.forEach(i => {
    const d = i.datumVerkoop || i.datumInkoop;
    if (!d) return;
    const key = d.slice(0, 7);
    if (!maandItems[key]) maandItems[key] = [];
    maandItems[key].push(i);
  });

  const maandSorted2 = Object.entries(maandItems).sort((a, b) => b[0].localeCompare(a[0]));

  document.getElementById('month-breakdown').innerHTML = maandSorted2.length
    ? maandSorted2.map(([key, mitems], mi) => {
        const [jaar, mIdx] = key.split('-');
        const label = maandNamen[parseInt(mIdx) - 1] + ' ' + jaar;
        const omzet = mitems.reduce((s, i) => s + i.prijsUit, 0);
        const inkoop = mitems.reduce((s, i) => s + i.prijsIn, 0);
        const winst = omzet - inkoop;

        // group by category
        const cats = {};
        mitems.forEach(i => {
          const c = i.categorie || 'Overig';
          if (!cats[c]) cats[c] = [];
          cats[c].push(i);
        });
        const catsSorted = Object.entries(cats).sort((a,b) => {
          const aT = b[1].reduce((s,i)=>s+i.prijsUit,0);
          const bT = a[1].reduce((s,i)=>s+i.prijsUit,0);
          return aT - bT;
        });

        const catsHtml = catsSorted.map(([cat, citems], ci) => {
          const cOmzet = citems.reduce((s,i)=>s+i.prijsUit,0);
          const cWinst = citems.reduce((s,i)=>s+i.prijsUit-i.prijsIn,0);
          const productsHtml = citems.map(p =>
            `<div class="product-item">
              <span>${p.naam}</span>
              <span style="color:var(--green);white-space:nowrap;margin-left:8px">${fmt(p.prijsUit)}</span>
            </div>`
          ).join('');
          return `<div>
            <div class="cat-row" onclick="toggleBlock('pl-${mi}-${ci}', this)">
              <div>
                <div style="font-size:0.85rem;font-weight:500">${cat}</div>
                <div style="font-size:0.72rem;color:var(--muted)">${citems.length} artikel${citems.length>1?'en':''}</div>
              </div>
              <div style="display:flex;align-items:center;gap:6px">
                <div style="font-family:'Fraunces',serif;font-weight:700;font-size:0.9rem;color:var(--green)">${fmt(cOmzet)}</div>
                <span class="accordion-arrow">▶</span>
              </div>
            </div>
            <div class="product-list" id="pl-${mi}-${ci}">${productsHtml}</div>
          </div>`;
        }).join('');

        return `<div class="accordion-row">
          <div class="accordion-header" onclick="toggleBlock('mb-${mi}', this)">
            <div>
              <div style="font-weight:500;text-transform:capitalize">${label}</div>
              <div style="font-size:0.75rem;color:var(--muted)">${mitems.length} verkocht · ${fmt(omzet)}</div>
            </div>
            <div style="display:flex;align-items:center;gap:6px">
              <div style="font-family:'Fraunces',serif;font-weight:700;color:${winst>=0?'var(--green)':'var(--red)'}">
                ${winst>=0?'+':''}${fmt(winst)}
              </div>
              <span class="accordion-arrow">▶</span>
            </div>
          </div>
          <div class="accordion-body" id="mb-${mi}">${catsHtml}</div>
        </div>`;
      }).join('')
    : '<p style="color:var(--muted);font-size:0.85rem">Nog niets verkocht met datum</p>';

  // per categorie (totaal, ook met uitklap)
  const cats = {};
  verkocht.forEach(i => {
    const c = i.categorie || 'Overig';
    if (!cats[c]) cats[c] = [];
    cats[c].push(i);
  });
  const sorted = Object.entries(cats).sort((a,b) => {
    const aw = b[1].reduce((s,i)=>s+i.prijsUit-i.prijsIn,0);
    const bw = a[1].reduce((s,i)=>s+i.prijsUit-i.prijsIn,0);
    return aw - bw;
  });

  document.getElementById('cat-breakdown').innerHTML = sorted.length
    ? sorted.map(([cat, citems], ci) => {
        const out = citems.reduce((s,i)=>s+i.prijsUit,0);
        const w = citems.reduce((s,i)=>s+i.prijsUit-i.prijsIn,0);
        const productsHtml = citems.map(p =>
          `<div class="product-item">
            <span>${p.naam}</span>
            <span style="color:var(--green);white-space:nowrap;margin-left:8px">${fmt(p.prijsUit)}</span>
          </div>`
        ).join('');
        return `<div class="accordion-row">
          <div class="accordion-header" onclick="toggleBlock('cb-${ci}', this)">
            <div>
              <div style="font-weight:500">${cat}</div>
              <div style="font-size:0.75rem;color:var(--muted)">${citems.length} verkocht</div>
            </div>
            <div style="display:flex;align-items:center;gap:6px">
              <div style="font-family:'Fraunces',serif;font-weight:700;color:${w>=0?'var(--green)':'var(--red)'}">
                ${w>=0?'+':''}${fmt(w)}
              </div>
              <span class="accordion-arrow">▶</span>
            </div>
          </div>
          <div class="accordion-body" id="cb-${ci}">${productsHtml}</div>
        </div>`;
      }).join('')
    : '<p style="color:var(--muted);font-size:0.85rem">Nog niets verkocht</p>';
}

function toggleBlock(id, headerEl) {
  const body = document.getElementById(id);
  if (!body) return;
  const arrow = headerEl.querySelector('.accordion-arrow');
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  if (arrow) arrow.classList.toggle('open', !isOpen);
}

function exportCSV() {
  if (!items.length) { showToast('Geen data om te exporteren'); return; }

  const header = ['Naam','Categorie','Winkel','Datum inkoop','Inkoopprijs','Verkoopprijs','Winst','Status','Datum verkoop','Notitie'];
  const rows = items.map(i => [
    i.naam, i.categorie, i.winkel, i.datumInkoop,
    i.prijsIn.toFixed(2), i.prijsUit ? i.prijsUit.toFixed(2) : '',
    i.prijsUit ? (i.prijsUit - i.prijsIn).toFixed(2) : '',
    i.status, i.datumVerkoop, i.notitie
  ].map(v => `"${(v||'').toString().replace(/"/g,'""')}"`).join(','));

  const csv = [header.join(','), ...rows].join('\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'marktplaats_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✓ CSV gedownload');
}

function clearAll() {
  if (!confirm('Weet je zeker dat je ALLE artikelen wilt verwijderen? Dit kan niet ongedaan worden gemaakt.')) return;
  items = [];
  save();
  renderList();
  showToast('Alles gewist');
}

function importHistorie() {
  if (!confirm('Dit vervangt alle huidige data. Doorgaan?')) return;
  items = HIST_DATA.slice();
  items.sort(function(a,b) { return b.datumInkoop.localeCompare(a.datumInkoop); });
  save();
  renderList();
  showToast('Geladen: ' + items.length + ' artikelen');
}


function exportJSON() {
  if (!items.length) { showToast('Geen data om te exporteren'); return; }
  const json = JSON.stringify(items, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'marktplaats_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Backup opgeslagen');
}

function importJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('Ongeldig formaat');
      if (!confirm(data.length + ' artikelen gevonden. Huidige data vervangen?')) return;
      items = data;
      save();
      renderList();
      showToast(items.length + ' artikelen hersteld');
    } catch(err) {
      alert('Fout bij importeren: ' + err.message);
    }
    input.value = '';
  };
  reader.readAsText(file);
}

// set today as default inkoop date
document.getElementById('datum-inkoop').value = new Date().toISOString().slice(0,10);
